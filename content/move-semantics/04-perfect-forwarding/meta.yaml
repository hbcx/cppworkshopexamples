title: "Perfect forwarding with a variadic factory"
standard: "C++11"
difficulty: 3
summary: "A make<T>(args...) factory that forwards each argument unchanged (lvalue stays lvalue, rvalue stays rvalue) using forwarding references and std::forward."
notes: "Args&&... in a deduced template context is a forwarding reference, not an rvalue reference. std::forward preserves the original value category; use it exactly once per forwarded argument. This is the mechanism behind emplace_back and make_unique."
run: true
sanitizers: []
