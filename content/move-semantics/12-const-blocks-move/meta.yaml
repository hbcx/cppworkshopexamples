title: "Anti-pattern: const on a by-value return type blocks moving"
standard: "C++17"
difficulty: 3
summary: "A const return-by-value looks harmless but makes the returned prvalue unmovable, so it copies on every assignment into existing storage."
notes: "const T makeThing() returns a const prvalue that cannot bind to a move operation, so callers copy-assign instead of move-assign. Copy elision hides the cost at initialization (T x = makeThing() elides everything), which is why the penalty is easy to miss -- it only shows once you assign the result into an existing object. Return by plain value; put const on the objects, not on the return type."
run: true
sanitizers: []
