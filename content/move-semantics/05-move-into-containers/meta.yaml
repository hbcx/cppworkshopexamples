title: "Moving objects into a std::vector"
standard: "C++11"
difficulty: 2
summary: "push_back copies an lvalue but moves an rvalue; emplace_back constructs in place. How std::move avoids a copy when filling a container."
notes: "A moved-from std::string is valid but in an unspecified state (typically empty). Read it only to reassign or destroy it, never rely on a specific leftover value. reserve() up front avoids reallocations while pushing."
run: true
